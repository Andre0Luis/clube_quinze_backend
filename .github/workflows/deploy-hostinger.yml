name: Build, Publish Image and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_extended_regression:
        description: "Executar regressão estendida (suite completa)"
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21' # ajuste se for outra versão

      - name: Run integration regression suite (H2)
        run: ./mvnw -B -Dspring.profiles.active=test -Dtest="*IntegrationTest" test

      - name: Run extended regression suite
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_extended_regression }}
        run: ./mvnw -B -Dspring.profiles.active=test test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/clube-quinze-backend:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/clube-quinze-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
