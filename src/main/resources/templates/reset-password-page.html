<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha - Clube Quinze</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --brand: #00053D;
      --brand-soft: rgba(0, 5, 61, 0.08);
      --ok: #0f8f4f;
      --error: #c72020;
      --border: #e4e7ec;
      --neutral: #98a2b3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef1f7 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 10px 40px rgba(0, 5, 61, 0.08), 0 2px 6px rgba(0, 5, 61, 0.04);
    }

    .logo-container {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid #f3f4f6;
      margin-bottom: 28px;
    }

    .logo-img {
      height: 64px;
      width: auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      text-align: center;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: -0.5px;
    }

    .muted {
      margin: 0 0 32px;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #374151;
    }

    .field {
      position: relative;
    }

    input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 48px 14px 14px;
      font-size: 0.95rem;
      outline: none;
      background: #fafbfc;
      transition: all 0.18s ease;
    }

    input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 3px var(--brand-soft);
    }

    input.error-border {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(199, 32, 32, 0.12);
    }

    input.ok-border {
      border-color: var(--ok);
    }

    .toggle-visibility {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      cursor: pointer;
      padding: 6px;
      margin: 0;
      width: auto;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-visibility:hover { color: var(--brand); }
    .toggle-visibility svg { width: 20px; height: 20px; }
    .toggle-visibility .eye-closed { display: none; }
    .toggle-visibility.is-visible .eye-open { display: none; }
    .toggle-visibility.is-visible .eye-closed { display: block; }

    .rules {
      background: #f7f9fc;
      border: 1px solid #eaeef4;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 0.88rem;
    }

    .rule {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      color: var(--neutral);
      transition: color 0.18s, transform 0.18s;
    }

    .rule:last-child { margin-bottom: 0; }

    .rule .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #fff;
      margin-right: 10px;
      font-size: 11px;
      font-weight: 700;
      transition: background 0.18s;
    }

    .rule.valid { color: var(--ok); }
    .rule.valid .icon { background: var(--ok); }

    .strength {
      height: 6px;
      width: 100%;
      background: #eef0f4;
      border-radius: 999px;
      margin-top: 14px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      transition: width 0.25s ease, background 0.25s ease;
      border-radius: 999px;
    }

    .match-error {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .match-ok {
      color: var(--ok);
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
      font-weight: 600;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 28px;
      border: 0;
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      border-radius: 10px;
      padding: 16px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover:not(:disabled) { opacity: 0.92; }
    button[type="submit"]:active:not(:disabled) { transform: translateY(1px); }

    button[type="submit"]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .spinner {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      margin-top: 16px;
      min-height: 22px;
      font-size: 0.9rem;
      text-align: center;
    }

    .status.ok { color: var(--ok); font-weight: 600; }
    .status.error { color: var(--error); font-weight: 600; }

    .footer {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #f3f4f6;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }
  </style>
</head>

    <h1>Redefinir senha</h1>
    <p class="muted">Crie uma nova senha segura para sua conta.</p>

    <form id="reset-form">
      <label for="password">Nova senha</label>
      <div class="field">
        <input id="password" type="password" autocomplete="new-password" placeholder="Digite sua nova senha" required />
        <button type="button" class="toggle-visibility" id="toggle-password" aria-label="Mostrar senha">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>

      <div class="rules" id="password-rules">
        <div class="rule" id="rule-length"><span class="icon">✓</span> Mínimo de 8 caracteres</div>
        <div class="rule" id="rule-upper"><span class="icon">✓</span> Pelo menos uma letra maiúscula</div>
        <div class="rule" id="rule-number"><span class="icon">✓</span> Pelo menos um número</div>
        <div class="rule" id="rule-symbol"><span class="icon">✓</span> Pelo menos um símbolo (!@#$%)</div>
      </div>

      <label for="confirmPassword">Confirmar nova senha</label>
      <div class="field">
        <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repita a nova senha" required />
        <button type="button" class="toggle-visibility" id="toggle-confirm" aria-label="Mostrar senha">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <div class="match-error" id="match-error">As senhas não conferem.</div>
      <div class="match-ok" id="match-ok">✓ As senhas coincidem</div>

      <button id="submit" type="submit" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Salvar nova senha</span>
      </button>
      <p id="status" class="status"></p>
    </form>

    <p class="footer">Se o link estiver expirado, solicite uma nova recuperação pelo aplicativo.</p>
  </main>

  <script>
    const form = document.getElementById("reset-form");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submit");
    const statusEl = document.getElementById("status");
    const matchError = document.getElementById("match-error");
    const matchOk = document.getElementById("match-ok");
    const spinner = document.getElementById("spinner");
    const btnText = document.getElementById("btn-text");
    const strengthBar = document.getElementById("strength-bar");

    function bindToggle(buttonId, inputEl) {
      const btn = document.getElementById(buttonId);
      btn.addEventListener("click", () => {
        const visible = inputEl.type === "text";
        inputEl.type = visible ? "password" : "text";
        btn.classList.toggle("is-visible", !visible);
        btn.setAttribute("aria-label", visible ? "Mostrar senha" : "Ocultar senha");
        inputEl.focus();
      });
    }
    bindToggle("toggle-password", passwordInput);
    bindToggle("toggle-confirm", confirmInput);

    const rules = {
      length: { el: document.getElementById("rule-length"), test: v => v.length >= 8 },
      upper:  { el: document.getElementById("rule-upper"),  test: v => /[A-Z]/.test(v) },
      number: { el: document.getElementById("rule-number"), test: v => /[0-9]/.test(v) },
      symbol: { el: document.getElementById("rule-symbol"), test: v => /[^A-Za-z0-9]/.test(v) }
    };

    let isValid = false;

    function updateStrength(metCount, totalRules) {
      const ratio = metCount / totalRules;
      const pct = Math.round(ratio * 100);
      strengthBar.style.width = pct + "%";
      if (ratio < 0.5) strengthBar.style.background = "#ef4444";
      else if (ratio < 1) strengthBar.style.background = "#f59e0b";
      else strengthBar.style.background = "#0f8f4f";
    }

    function validatePassword() {
      const v = passwordInput.value;
      const cv = confirmInput.value;

      let metCount = 0;
      const totalRules = Object.keys(rules).length;

      for (const key in rules) {
        const passed = rules[key].test(v);
        rules[key].el.classList.toggle("valid", passed);
        if (passed) metCount++;
      }

      updateStrength(metCount, totalRules);
      const allRulesMet = metCount === totalRules;

      if (cv.length > 0) {
        if (v !== cv) {
          matchError.style.display = "block";
          matchOk.style.display = "none";
          confirmInput.classList.add("error-border");
          confirmInput.classList.remove("ok-border");
        } else {
          matchError.style.display = "none";
          matchOk.style.display = "block";
          confirmInput.classList.remove("error-border");
          confirmInput.classList.add("ok-border");
        }
      } else {
        matchError.style.display = "none";
        matchOk.style.display = "none";
        confirmInput.classList.remove("error-border");
        confirmInput.classList.remove("ok-border");
      }

      passwordInput.classList.toggle("ok-border", allRulesMet);

      isValid = allRulesMet && v === cv && v.length > 0;
      submitBtn.disabled = !isValid;
    }

    passwordInput.addEventListener("input", validatePassword);
    confirmInput.addEventListener("input", validatePassword);

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status " + (type || "");
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        spinner.style.display = "block";
        btnText.textContent = "Aguarde...";
      } else {
        submitBtn.disabled = !isValid;
        spinner.style.display = "none";
        btnText.textContent = "Salvar nova senha";
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!isValid) return;

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const password = passwordInput.value;

      if (!token) {
        setStatus("Token ausente no link. Solicite um novo pelo aplicativo.", "error");
        return;
      }

      setStatus("", "");
      setLoading(true);

      try {
        const response = await fetch("/api/v1/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword: password })
        });

        if (!response.ok) {
          let message = "Não foi possível redefinir a senha.";
          try {
            const payload = await response.json();
            message = payload.message || message;
          } catch (_) {}
          throw new Error(message);
        }

        setStatus("Senha redefinida com sucesso. Você já pode entrar no app com a nova senha.", "ok");
        form.reset();
        validatePassword();
        submitBtn.disabled = true;
      } catch (error) {
        setStatus(error.message || "Erro inesperado ao redefinir senha.", "error");
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
