# ===============================================================
# Configuracoes de Teste de Integração - Clube Quinze
# Banco H2 em memória, sem infraestrutura externa
# ===============================================================

# H2 em memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate gerencia o schema a partir das entidades (DDL)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Flyway desabilitado: H2 usa DDL do Hibernate
spring.flyway.enabled=false

# Infra externa desabilitada nos testes de integração
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

# Desabilita email real em testes
spring.mail.host=localhost
spring.mail.port=3025
app.brevo.enabled=false
app.brevo.api-key=test-key-disabled

# Segurança JWT igual ao local (pode usar o default)
app.security.jwt.secret=xXQ+rd9icS2S2k3j8w4bM+zP5u0dQLhN8aYQ+jXcPwo=
app.security.jwt.expiration-minutes=60
app.security.jwt.refresh-expiration-days=7
app.security.reset.expiration-minutes=30
app.security.reset.base-url=http://localhost/reset-password

# Media storage aponta para /tmp em testes
app.media.storage-path=/tmp/clube-quinze-test-uploads
app.media.base-url=http://localhost/uploads

# Logging minimalista em testes
logging.level.org.springframework.security=WARN
logging.level.br.com.clube_quinze.api=INFO
logging.level.org.hibernate.SQL=WARN

# Actuator
management.endpoints.web.exposure.include=health

# Desabilita notificações de log
app.notifications.logging.enabled=false

# Firebase desabilitado em testes (service account JSON não está disponível no CI)
firebase.enabled=false
