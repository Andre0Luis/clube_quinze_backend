<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha - Clube Quinze</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --brand: #00053d;
      --ok: #0f8f4f;
      --error: #c72020;
      --border: #e4e7ec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 15% 20%, #ffffff 0%, var(--bg) 45%, #e9edf3 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 14px 30px rgba(16, 24, 40, 0.08);
    }

    .logo {
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 1.6px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    .muted {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(0, 5, 61, 0.12);
    }

    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.9rem;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">CLUBE QUINZE</div>
    <h1>Redefinir senha</h1>
    <p class="muted">Digite a nova senha para concluir a recuperação de acesso.</p>

    <form id="reset-form">
      <label for="password">Nova senha</label>
      <input id="password" type="password" minlength="6" required />

      <label for="confirmPassword">Confirmar nova senha</label>
      <input id="confirmPassword" type="password" minlength="6" required />

      <button id="submit" type="submit">Salvar nova senha</button>
      <p id="status" class="status"></p>
    </form>

    <p class="footer">Se o link estiver expirado, solicite uma nova recuperação no aplicativo.</p>
  </main>

  <script>
    const form = document.getElementById('reset-form');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit');

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = 'status ' + (type || '');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!token) {
        setStatus('Token ausente no link. Solicite um novo e-mail de recuperação.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        setStatus('As senhas não conferem.', 'error');
        return;
      }

      if (password.length < 6) {
        setStatus('A senha deve ter no mínimo 6 caracteres.', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('Atualizando sua senha...', '');

      try {
        const response = await fetch('/api/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: password })
        });

        if (!response.ok) {
          let message = 'Não foi possível redefinir a senha.';
          try {
            const payload = await response.json();
            message = payload.message || message;
          } catch (_) {
            // Ignore non-JSON error payload.
          }
          throw new Error(message);
        }

        setStatus('Senha redefinida com sucesso. Você já pode entrar no app com a nova senha.', 'ok');
        form.reset();
      } catch (error) {
        setStatus(error.message || 'Erro inesperado ao redefinir senha.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
